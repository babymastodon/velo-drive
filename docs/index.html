    <link rel="manifest" href="velodrive.webmanifest" />
    <!-- Dynamic theme colors: browser chrome follows the OS theme instead of a
         static dark #222. -->
    <meta name="theme-color" content="#f4f4f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#222222" media="(prefers-color-scheme: dark)" />
    <!-- Anti-FOUC: sync, runs before paint. Must stay inline in <head>. -->
    <script>
      (function applyInitialTheme() {
        try {
          const root = document.documentElement;
          const mode = localStorage.getItem("themeMode") || "auto";
          root.classList.remove("theme-light", "theme-dark");
          if (mode === "dark") root.classList.add("theme-dark");
          else if (mode === "light") root.classList.add("theme-light");
          root.dataset.theme = mode;
        } catch (_err) {}
      })();
    </script>
